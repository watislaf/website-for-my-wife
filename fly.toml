# Fly.io deploy config — volume-backed SQLite (libSQL file: mode), no Turso.
#
# The app name below is a placeholder; `fly launch` will confirm/replace it.
# Migrations run at CONTAINER STARTUP (see Dockerfile CMD), NOT via
# release_command — Fly's release machine has NO volume mounted, so it could
# not migrate the on-disk /data/app.db. The real machine has the volume.
app = "website-for-my-wife"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

# Non-secret runtime config. Secrets (SESSION_SECRET, ADMIN_PASSWORD_HASH) are
# set with `fly secrets set` — do NOT put them here.
[env]
  DATABASE_PATH = "/data/app.db"
  TZ = "Europe/Warsaw"
  PORT = "3000"

# Persistent volume holding the SQLite file. Create it before first deploy:
#   fly volumes create data --size 1 --region fra
[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle to save cost. With a single volume you run one
  # machine; a second machine would need its own volume and would not share data.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
