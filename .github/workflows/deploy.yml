# CD: build the app image, push to GHCR, and redeploy on the Hetzner server.
#
# GHCR lowercase requirement:
#   GHCR image names MUST be lowercase. `${{ github.repository }}` preserves the
#   owner/repo's original case, so if the owner or repo name contains uppercase
#   letters, using it verbatim would produce an invalid image ref and the
#   push/pull would fail. The `image` job step below lowercases the repository
#   once and every subsequent reference uses that lowercased value.
#
# Private-repo note:
#   The built-in GITHUB_TOKEN is scoped to a single workflow run. `docker login`
#   inside the Deploy step uses it in the same run, so the `docker compose pull`
#   during deploy works even for a private repo. However, MANUAL re-pulls on the
#   server later (outside a run) need a Personal Access Token with `read:packages`
#   (`docker login ghcr.io -u <user> -p <PAT>`). See README.
name: deploy
on:
  push: { branches: [main] }
permissions: { contents: read, packages: write }
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name
        id: image
        run: echo "ref=ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.ref }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Prepare compose file
        run: sed "s|ghcr.io/GITHUB_USER/personal-site|${{ steps.image.outputs.ref }}|" docker-compose.yml > compose.deploy.yml
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.deploy.yml,Caddyfile"
          target: /opt/personal/
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/personal
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            mv compose.deploy.yml docker-compose.yml
            docker compose pull && docker compose up -d
            docker image prune -f
